<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오메이커스</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/gh/leetaewook/gmarket-sans-dynamic-subset/GmarketSans.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        a {
            text-decoration: none;
            color: inherit;
            /* 부모 요소의 글자색을 그대로 쓴다 -> 상속한다 */
        }

        li {
            list-style: none;
            /* 블릿기호 초기화 */
        }

        body {
            font-family: 'GMarketSans';
            color: rgba(0, 0, 0, 0.7);
            background-color: #e9e9e9;
        }

        #wrap {
            max-width: 640px;
            margin: 0 auto;
            background: #fff;
        }

        /* link-area */
        .link-area {
            padding: 20px 15px;
            /* 상하 좌우 */
        }

        .link-area>a {
            padding: 5px;
            margin-right: 10px;
        }

        .link-area>a>img {
            width: 18px;
        }

        /* .contents */
        .contents {
            position: relative;
            /* body 라는 영역에서 분리 시켜준다 */
            border-radius: 20px 20px 0 0;
            /* top / right / bottom / left */
            padding: 20px;
            margin-top: -30px;
            z-index: 5;
            /*  position: relative 이걸 사용하고 나서 z-index를 사용하면 분리시킨 부분을 위 아래 바꿀 수 있다.
            */
            background: #fff;
        }

        .product-img {
            position: relative;
            z-index: 2;
        }

        .title-area>span {
            background: #efefef;
            padding: 6px 8px;
            border-radius: 5px;
            font-size: 14px;
            color: #666;
            display: inline-block;
            margin-bottom: 16px;
        }

        .title-area>.title {
            font-weight: 500;
            font-size: 16px;
            color: #111;
        }

        .title-area>.title>span {
            display: block;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <div class="link-area">
            <a href="#"><img src="img/ico-back.png" alt="뒤로가기">
            </a>
            <a href="#">
                <img src="img/ico.home.png" alt="홈으로 가기">
            </a>
        </div>
        <img src="img/product-img.jpg" alt="" class="product-img">
        <div class="contents">
            <div class="title-area">
                <span class="category">#기부후원</span>
                <p class="title">[고체 디 사포레] 이탈리아 단일품종 엑스트라버진 올리브오일 500ml (선물포장 포함) <span>원산지: 이탈리아</span>
                </p>
                <p class="price">
                    <span>59,900</span>원
                </p>
            </div>
            <!-- //title-area -->
            <div class="product-info">
                <ul class="drder-info">
                    <li>
                        <strong>주문 기간</strong>
                        <p>주문 마감 4일 전
                            2026. 4. 17(금) 오후 5시 ~ 5. 18(월) 오후 5시</p>
                    </li>
                    <li>
                        <strong>배송비</strong>
                        <p>배송비 무료
                            제주 5,000원 / 도서산간 5,000원</p>
                    </li>
                    <li><strong>배송 시작일</strong>
                        <p>5월 15일 순차 출고</p>
                    </li>

                </ul>
            </div>
        </div>
    </div>
</body>

</html>
