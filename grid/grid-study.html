<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그리드 이걸로 할까</title>
    <link rel="stylesheet" href="css/reset.css">

    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .item {
            width: 150px;
            aspect-ratio: 1;
            border-radius: 50%;
            background: skyblue;
            justify-self: center;
        }

        .item:nth-child(1) {
            grid-column: 1;
        }

        .item:nth-child(2) {
            grid-column: 3;
        }

        .gallery.flex {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 120px;
        }
    </style>
</head>

<body>
    <div class="gallery">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
    </div>
    <div class="gallery flex">
        <div class="top">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
        </div>
        <div class="bottom">
            <div class="item">4</div>
            <div class="item">5</div>
        </div>
    </div>
</body>

</html>
