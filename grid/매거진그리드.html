<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매거진그리드</title>
    <link rel="stylesheet" href="css/reset.css">

    <style>
        body {
            background: rgb(189, 189, 226);
        }

        .wrap {
            max-width: 960px;
            margin: 40px auto;
        }

        .wrap h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: 200px;
            /* 그리드 기본 높이 */
            gap: 20px;
        }

        .item {
            padding: 20px;
            border-radius: 8px;
            background: #fff;
            text-align: center;

        }

        .item.item-big {
            background: slateblue;
            grid-column: span 2;
            grid-row: span 2;
        }

        .full {
            height: 100vh;
            display: grid;
            justify-content: center;
            align-items: center;

            grid-template-columns: repeat(3, 150px);
            grid-auto-rows: 100px;
            gap: 24px;
        }

        .full .item {
            display: grid;
            place-items: center;
            /* 정가운데 배치 */
            font-size: 20px;
        }

        @media screen and (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
                grid-auto-rows: 150px;
                /* 기본높이 */
            }

            .item.item-big {
                grid-column: span 1;
                grid-row: span 1;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <!--   <h2>특정 카드만 크게 보이는 레이아웃</h2>
        <div class="grid">
            <div class="item item-big">프론트개발</div>
            <div class="item">반응형 웹</div>
            <div class="item">js/react UI 개발</div>
            <div class="item">2d 그래픽</div>
            <div class="item">영상편집</div>
            <div class="item">피그마</div>
        </div> -->

        <div class="full">
            <div class="item">탄수화물</div>
            <div class="item">단백질</div>
            <div class="item">지방</div>
            <div class="item">식이섬유</div>
            <div class="item">비타민</div>
            <div class="item">미네랄</div>
        </div>
    </div>
</body>

</html>
