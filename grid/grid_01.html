<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그리드 기초</title>
    <link rel="stylesheet" href="css/reset.css">
    <style>
        .container {
            display: grid;
            border: 1px solid black;
            /*   grid-template-columns: repeat(3, 1fr); */
            /* 부모기준으로 자식요소의 영역을 균등분할 */
            gap: 20px;
            /* 자식요소가 4칸일 경우 */
            grid-template-columns: repeat(2, 1fr);
        }

        .container>div {
            background: #ddd;
            padding: 20px;
            border: 1px solid black;

        }
    </style>
</head>

<body>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>
    <style>
        .grid-span {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            margin: 100px;
            border: 1px solid blue;
            gap: 10px;
        }

        .grid-span div {
            background: #ddd;
            border: 1px solid blue;
            gap: 10px;

        }

        .big {
            grid-column: span 2;
        }
    </style>
    <div class="grid-span">
        <div class="big">1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>
</body>

</html>
