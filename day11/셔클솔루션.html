<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>셔클솔루션</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            background-color: #e5e5e5;
        }

        .solution2 {}

        .solution2 .inner {
            width: 960px;
            margin: 50px auto;
        }

        .sub-title {
            text-align: center;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .solution2 h2 {
            font-weight: 800;
            font-size: 28px;
            margin-bottom: 15px;
            text-align: center;
        }

        .solution2 h2 span {
            display: block;
            color: #1466f0;
            font-size: 24px;
        }

        .solution2 .sub-text {
            line-height: 1.6;
            text-align: center;
            font-size: 18px;
            margin-bottom: 60px;
        }

        .solution2 .app-info {
            padding: 40px 50px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            gap: 40px;
            align-items: center;
        }

        .app-info .text-group,
        .app-info img {
            width: calc((100%/2) - 2px)
        }

        .app-info h3 {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <section class="solution2">
        <div class="inner">
            <p class="sub-title">솔루션 02</p>
            <h2>
                통합 모빌리티 앱
                <span>MaaS(Mobility as a Service)</span>
            </h2>

            <p class="sub-text">지역의 다양한 이동수단들을 한 곳에서 탐색하고<br>호출, 결제할 수 있는 통합 모빌리티 앱을 제공합니다.</p>
            <div class="app-info">
                <div class="text-group">
                    <h3>다양한 이동수단을 통합한 하나의 앱</h3>
                    <p class="text">수요응답교통, 택시, 공유 자전거, 대중교통(24년 예정)등 다양한 이동수단을 하나의 앱에서 호출부터 결제까지 편리하게 이용 가능합니다.</p>
                </div>
                <img src="https://images.squarespace-cdn.com/content/v1/658ba86efc1fb41193cd1906/9eb088d1-bfc2-4d8d-81d2-c140efa34b1c/solution3_1.png?format=750w"
                    alt="">
            </div>
        </div>
    </section>

</body>

</html>
