<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미디어쿼리 단위</title>
    <link rel="stylesheet" href="css/reser.css">
    <style>
        html {
            font-size: 18px;
        }

        .px {
            height: 100vh;
            max-width: 1200px;
            /* 최대너비를 선언하고 0~최대너비까지의 영역을 모두 보여줌 */
            /*    width: 1200px; */
            margin: 0 auto;
            background: lightgreen;
        }

        /* 1em = 16px / 1rem = 16px */
        .em {
            font-size: 32px;
        }

        .em p {
            font-size: 20px;
            padding: 1.5em;
        }

        /* rem(root em) 1rem=16px */
        .rem p {
            padding: 1rem;
        }
    </style>
</head>

<body>
    <div class="px">1200px</div>
    <div class="em">
        <p>
            나는 em 부모 em
            <span>나는 em</span>
        </p>
    </div>
    <div class="rem">
        <p>
            나는 rem 부모 rem
            <span>나는 rem</span>
        </p>
    </div>
</body>

</html>
