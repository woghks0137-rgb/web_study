<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품카드정보</title>
    <link rel="stylesheet" href="/Chocolat/css/reset.css">
    <style>
        .contents {
            padding: 20px;
            background: lightgray;
            max-width: 1440px;
            margin: 0 auto;
        }

        header {
            height: 120px;
            line-height: 120px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
            background: #444;
        }

        .main {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            place-items: center;
        }

        .box {
            background: #fff;
            font-size: 22px;
            font-weight: 500;
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1024이하 */
        @media screen and (max-width:1024px) {
            .main {
                grid-template-columns: repeat(3, 1fr);
            }

            .box {
                font-size: 20px;
                background: mediumpurple;
            }
        }

        /* 600이하 */
        @media screen and (max-width:600px) {
            .main {
                grid-template-columns: repeat(2, 1fr);
            }

            .box {
                font-size: 18px;
                background: #c4c736be;
            }
        }
    </style>
</head>

<body>
    <div class="contents">
        <header>HEADER</header>
        <div class="main">
            <div class="box">추천아이템</div>
            <div class="box">베스트아이템</div>
            <div class="box">테마아이템</div>
            <div class="box">원픽아이템</div>
            <div class="box">세일아이템</div>
        </div>
    </div>
</body>

</html>
