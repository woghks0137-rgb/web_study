<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형카드</title>
    <link rel="stylesheet" href="css/reset.css">
    <style>
        html {
            font-size: 16px;
        }

        .card-area {
            max-width: 960px;
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 30px;
        }

        .card-area li {
            flex: 1;
        }

        .card-area img {
            max-width: 100%;
            height: 15rem;
            /* 기준 글자 크기 16 / 선언할 높이 240px => 15/240 */
            margin-bottom: 1.875rem;
            /* 30px을 글자크기 16px로 나눈 값    */
        }

        .card-area .card-text {
            padding: 1.56rem;
            border: 1px solid black;
        }

        .card-area .card-text strong {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        @media screen and (max-width:600px) {
            html {
                font-size: 14px;
            }

            .card-area {
                max-width: 100%;
                padding: 15px;
            }

            .card-area li {
                flex: none;
                /* flex:1로 균등분할한 경우 모바일에서 초기화 */
                margin-bottom: 25px;

                display: flex;
                justify-content: space-between;
                gap: 20px;
                width: 100%;
            }

            .card-area li img {
                flex: 1;
                width: 100%;
            }

            .card-area li .card-text {
                flex: 1;
            }
        }
    </style>
</head>

<body>
    <u class="card-area">
        <li>
            <img src="https://images.unsplash.com/photo-1597633425046-08f5110420b5?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="">
            <div class="card-text">
                <strong>우리집 강아지</strong>
                <p>먹는 걸 너무 좋아해서 간식타임을 제일 기다려요</p>
            </div>
        </li>
        <li>
            <img src="https://images.unsplash.com/photo-1514984879728-be0aff75a6e8?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fCVFQSVCMCU5NSVFQyU5NSU4NCVFQyVBNyU4MHxlbnwwfDB8MHx8fDI%3D"
                alt="">
            <div class="card-text">
                <strong>달리기를 좋아하는 딜리트</strong>
                <p>뛰어노는 걸 제일 좋아하는 딜리트는 산책시간이 제일 좋대요.</p>
            </div>
        </li>
    </u>
</body>

</html>
