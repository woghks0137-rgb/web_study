<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미디어쿼리 기본</title>
    <link rel="stylesheet" href="css/reset.css">
    <style>
        body {
            font-size: 18px;
        }

        .box-group {
            display: flex;
            flex-wrap: wrap;
            /* 줄바꿈 */
        }

        .box-group>div {
            width: calc(100%/5);
            height: 200px;
        }

        .box1 {
            background: skyblue;
        }

        .box2 {
            background: rgb(56, 112, 93);
        }

        .box3 {
            background: rgb(150, 89, 9);
        }

        .box4 {
            background: rgb(117, 44, 39);
        }

        .box5 {
            background: rgb(123, 31, 151);
        }

        @media screen and (max-width:768px) {
            body {
                font-size: 14px;
            }

            .box-group>div {
                width: 50%;
            }
        }
    </style>
</head>

<body>
    <h1>반응형 웹 기초</h1>
    <p>브라우저 크기를 줄여보세요.</p>

    <div class="box-group">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
    </div>
</body>

</html>
