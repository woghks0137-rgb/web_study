<!DOCTYPE html>
<html lang="ㅏㅐ">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/Chocolat/css/reset.css">
    <style>
        body {
            background: #f5f5f5;

        }

        .container {
            max-width: 1200px;
            background: #FFF;
            margin: 40px auto;
            padding: 20px;
        }

        #inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 auto;
            border: 1px solid black;
            border-radius: 20px;
            padding: 30PX;
            gap: 20px;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .text {
            align-self: flex-start;
            /* 👈 나 혼자만 위로 올라갈게! */
        }

        h2 {
            margin-left: 10px;
            margin-bottom: 20px;
        }

        h3 {
            margin-bottom: 20px;
        }

        @media screen and (max-width:980px) {
            #inner {
                display: grid;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">

        <div class="container">
            <h2>추천여행지-교토</h2>
            <section id="inner">
                <div class="hero">
                    <img src="https://images.unsplash.com/photo-1774173511909-3a9f9ab208cb?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                        alt="">
                </div>
                <div class="text">
                    <h3>고즈넉한 분위기를 느낄 수 있는 일본의 전통 도시</h3>
                    <p>교토는 화려함보다는 고요함을 즐기는 사람들에게 가장 잘 맞는 여행지입니다.기요미즈데라,후시미 이나리 신사,이라시야마 대나무숲 등 자연과 전통 건축이 어우러져 여유로운 시간을
                        선물해줍니다.</p>
                </div>
            </section>
        </div>
    </div>

</body>

</html>
