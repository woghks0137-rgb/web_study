<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 레이아웃</title>
    <link rel="stylesheet" href="/Chocolat/css/reset.css">
    <style>
        body {
            background: #f5f5f5;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* hero */
        .hero {
            margin: 20px 0;
            /* height: 45vh; */
            border-radius: 20px;
            overflow: hidden;
        }

        .hero img {
            object-fit: cover;
            /* image에 dbject-fit 속성을 선언하기 위해서는 img의 width/height를 선언하면 되지만 이미지의 비율을 고려해서 선언해야한다 */
            width: 100%;
            /* height:100% */
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0 50px;
        }

        .cards .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        /* 반응형 */
        @media screen and (max-width:1024px) {
            .cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media screen and (max-width:640px) {
            .cards {
                grid-template-columns: 1fr;
                /* 한 칸 */
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero">
            <img src="https://images.unsplash.com/photo-1777047023579-5007a6d402bc?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="">
        </div>

        <div class="cards">
            <div class="card">
                <h3>필수여행지</h3>
                <p>대표적인 명소와 풍경을 즐길 수 있는 스팟을 소개합니다.</p>
            </div>
            <div class="card">
                <h3>추천음식</h3>
                <p>여행지에서 꼭 먹어봐야 할 현지 음식 리스트</p>
            </div>
            <div class="card">
                <h3>여행 팁</h3>
                <p>게절, 교통, 예산 등 여행 전에 알아두면 좋은 정보</p>
            </div>
        </div>
    </div>
</body>

</html>
