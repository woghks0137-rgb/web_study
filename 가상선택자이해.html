<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가상선택자이해</title>
    <link rel="stylesheet" href="Chocolat/css/reset.css">
    <style>
        body {
            background: #f6f4ff;
            color: #222;
            padding: 50px;
        }

        section {
            max-width: 900px;
            margin: 0 auto 100px;
        }

        h2 {
            margin-bottom: 20px;
        }

        /* 1. 밑줄 애니메이션 */
        .gnb {
            display: flex;
            gap: 30px;
        }

        .gnb a {
            position: relative;
            font-weight: 700;
            font-size: 18px;
            padding-bottom: 8px;
        }

        .gnb a::before {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: #6645c9;
            transition: 0.4s;
            content: "";
        }

        .gnb a:hover::before {
            width: 100%;
        }

        /* 2. 카드뱃지 */
        .card {
            position: relative;
            width: 260px;
            padding: 30px;
            background: #fff;
            border-radius: 20px;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card:before {
            content: 'NEW';
            position: absolute;
            top: -10px;
            right: 10px;
            background: #6645c9;
            color: white;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 20px;
            opacity: 0;
            transition: 0.3s;
        }

        .card:hover::before {
            opacity: 1;
            transition: 0.3s;
        }

        .cheak-list li {
            position: relative;
            padding-left: 28px;
            margin-bottom: 14px;
            font-size: 18px;
        }

        .cheak-list li::before {
            content: '💚';
            position: absolute;
            left: 0;
            top: 0;
        }

        .more-btn {
            position: relative;
            display: inline-block;
            padding: 14px 48px 14px 24px;
            background: #222;
            color: #fff;
            border-radius: 30px;
            overflow: hidden;
        }

        .more-btn::after {
            content: "→";
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            transition: 0.3s;

        }

        .more-btn:hover::after {
            right: 14px;

        }
    </style>
</head>

<body>
    <section>
        <h2>1. 메뉴 애니메이션</h2>
        <nav class="gnb">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Service</a>
            <a href="#">Content</a>
        </nav>
    </section>
    <section>
        <h2>2. 카드 New 뱃지</h2>
        <div class="card">
            <h3>Figma Basic Class</h3>
            <p>초보자를 위한 UI 디자인 실무</p>
        </div>
    </section>
    <section>
        <h2>3. 리스트앞 체크 아이콘</h2>
        <ul class="cheak-list">
            <li>html 구조이해</li>
            <li>CSS 선택자 연습</li>
            <li>가상선택자 UI 활용</li>
        </ul>
    </section>
    <section>
        <h2>4. 버튼 화살표 효과</h2>
        <a href="#" class="more-btn">자세히보기 </a>
    </section>

    <style>
        .title-deco {
            position: relative;
            display: inline-block;
            font-size: 34px;
            font-weight: 700;
        }

        .title-deco::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 34px;
            background: #6645c9;
            border-radius: 10px;
        }

        .title-deco::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 70%;
            height: 10px;
            background: rgba(102, 69, 201, 0.18);
            z-index: -1;
        }
    </style>
    <section>
        <h2>5. 제목 장식효과</h2>
        <h1 class="title-deco">Design Class</h1>
    </section>
</body>

</html>
