<!DOCTYPE html>
<html lang="ko">

<head>

    <title>삼청각</title>

<body>
    <div class="tour">
        <div class="tour-text">
            <strong>하나로 조화를 이루는 아름다운 한옥</strong>
            <p>
                한옥의 당당함과 아름다운 정원이 조화를 이루는 일화당은 <br>7.4 남북 공동성명 대표단의 만찬이 열렸던 역사적인 장소입니다. <br>'하나로 조화를 이루는' 일화당은 푸른 자연 속에서
                한국의 미와<br>아름다운 멋의 새로운 경험을 선사해 드릴 한국 전통의 한옥입니다.
            </p>
        </div>
        <dl>
            <div>
                <dt>시설면적</dt>
                <dd>422㎡</dd>
            </div>
            <div>
                <dt>시설형태</dt>
                <dd>1층 한옥</dd>
            </div>
            <div>
                <dt>특이사항</dt>
                <dd>넓은 앞마당</dd>
            </div>
        </dl>
    </div>
