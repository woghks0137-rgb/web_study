<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼청각</title>

    <style>
        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 1280px;
            margin: auto;
        }

        .box2 {
            font-size: 18px;
            text-align: right;
        }

        .text {
            display: block;
            margin-top: -20px;
        }

        h2 {
            font-weight: 400;
        }

        strong {
            font-weight: 800;
        }

        .main-text {
            font-weight: 200;
            font-size: 14px;
            margin-left: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            <h2>
                한식당 <strong>이용안내</strong><span class="main-text">Information</span>
            </h2>
        </div>
        <div class="box2">
            <p>문의전화</p>
            <span class="text">Tel 02-765-3000</span>
        </div>
    </div>
</body>

</html>
