    <style>
        a {
            font-size: 20px;
            text-decoration: none;
        }

        .outline {
            display: inline-block;
            /* width가 선언되면 
            1.margin으로 박스를 가운데 이동할지 말지
            2.text-align으로 텍스트가 정렬할지 말지*/
            width: 240px;
            height: 50px;
            border: 2px solid skyblue;
            text-align: center;
            line-height: 50px;
        }

        .solid {
            padding: 10px 20px;
            background: skyblue;
            color: black;
            /* 배경색에 따라서 텍스트 색상 선언 */
            border-radius: 40px;
            /* 모서리의 둥글기(곡률) */
        }
    </style>

    <a href="" class="outline">BUY NOW (지금 구매하기)</a>
    <a href="" class="solid">BUY NOW (지금 구매하기)</a>
    <a href="" class="border">BUY NOW</a>
